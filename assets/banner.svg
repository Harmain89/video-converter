<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1020"/>
      <stop offset="1" stop-color="#1a1145"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.12" cy="0.0" r="0.7">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="1.0" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#21d4fd" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#21d4fd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#21d4fd"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c9c6ff"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="28" fill="url(#glowA)"/>
  <rect width="1200" height="320" rx="28" fill="url(#glowB)"/>
  <rect x="1.5" y="1.5" width="1197" height="317" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- logo tile -->
  <rect x="92" y="100" width="120" height="120" rx="30" fill="url(#tile)"/>
  <g transform="translate(116,124) scale(3)" stroke="#fff" fill="none">
    <path d="M4.5 12a7.5 7.5 0 0 1 12.4-5.7" stroke-width="1.9" stroke-linecap="round"/>
    <path d="M19.5 12a7.5 7.5 0 0 1-12.4 5.7" stroke-width="1.9" stroke-linecap="round"/>
    <path d="M17.2 2.6v3.9h-3.9" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M6.8 21.4v-3.9h3.9" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10.2 9.1v5.8l5-2.9-5-2.9z" fill="#fff" stroke="none"/>
  </g>

  <!-- text -->
  <text x="252" y="150" font-size="56" font-weight="800" fill="url(#title)" letter-spacing="-1">Smart Video Converter</text>
  <text x="254" y="192" font-size="24" font-weight="500" fill="#9a9ab5">Local &#183; Lossless &#183; Hardware-accelerated &#8212; convert without the wait</text>

  <!-- feature pills -->
  <g font-size="18" font-weight="600">
    <g transform="translate(254,224)">
      <rect width="150" height="40" rx="20" fill="#7c5cff" fill-opacity="0.16" stroke="#7c5cff" stroke-opacity="0.45"/>
      <text x="75" y="26" text-anchor="middle" fill="#c9c6ff">&#9889; Instant remux</text>
    </g>
    <g transform="translate(416,224)">
      <rect width="132" height="40" rx="20" fill="#21d4fd" fill-opacity="0.14" stroke="#21d4fd" stroke-opacity="0.45"/>
      <text x="66" y="26" text-anchor="middle" fill="#a9ecff">QSV accel</text>
    </g>
    <g transform="translate(560,224)">
      <rect width="158" height="40" rx="20" fill="#21e6a4" fill-opacity="0.14" stroke="#21e6a4" stroke-opacity="0.45"/>
      <text x="79" y="26" text-anchor="middle" fill="#9bf3d4">No uploads</text>
    </g>
    <g transform="translate(730,224)">
      <rect width="150" height="40" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="75" y="26" text-anchor="middle" fill="#ececf5">MP4 &#183; MKV</text>
    </g>
  </g>
</svg>
